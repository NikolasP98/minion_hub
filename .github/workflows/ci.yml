name: CI

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_DEFAULT_ORG_SLUG: ci
      PUBLIC_POSTHOG_HOST: https://posthog.invalid
      PUBLIC_POSTHOG_KEY: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Svelte environment and translations
        run: |
          cp .env.example .env
          bun run i18n:compile

      - name: Svelte check + typecheck
        run: bun run check

      - name: Design token integrity
        run: bun run lint:tokens:ci

      - name: Design lint ratchet (changed files)
        env:
          DESIGN_LINT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -z "$DESIGN_LINT_BASE_REF" || "$DESIGN_LINT_BASE_REF" =~ ^0+$ ]]; then
            export DESIGN_LINT_BASE_REF="$(git rev-parse HEAD^)"
          fi
          bun run lint:design:ci

      - name: Prettier check (changed files)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          mapfile -d '' files < <(git diff -z --name-only --diff-filter=ACMR "$BASE_SHA" "$GITHUB_SHA" -- \
            '*.css' '*.js' '*.json' '*.md' '*.svelte' '*.ts' '*.yaml' '*.yml')
          if (( ${#files[@]} > 0 )); then
            bunx prettier --plugin=prettier-plugin-svelte --check -- "${files[@]}"
          fi

      - name: Build
        run: bun run build
